# Render blueprint for Aurelia.
# https://render.com/docs/blueprint-spec
#
# After connecting the GitHub repo on Render, fill in the env vars marked
# `sync: false` from the dashboard (or via `render env set`). The
# service-account JSON should be pasted as a single-line string.

services:
  - type: worker
    name: aurelia
    runtime: python
    plan: starter
    region: oregon
    branch: main
    # Pre-download Silero VAD + turn-detector ONNX weights at build time so
    # the first inbound call isn't cold-started by a ~200MB model download.
    # HF_HOME points into the project source dir so the cache is preserved
    # from Render's build container into the runtime container (the default
    # ~/.cache/huggingface path is NOT preserved).
    # Python version is read from .python-version (3.11).
    buildCommand: pip install --upgrade pip && pip install . && HF_HOME=/opt/render/project/src/.hf-cache aurelia download-files
    startCommand: aurelia start
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HF_HOME
        value: /opt/render/project/src/.hf-cache
      - key: AURELIA_ENV
        value: prod
      - key: AURELIA_LOG_LEVEL
        value: INFO
      - key: AURELIA_COMPANY_NAME
        sync: false
      - key: AURELIA_AGENT_NAME
        value: Aurelia
      - key: AURELIA_BUSINESS_HOURS
        sync: false

      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_LLM_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: shimmer
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_STT_MODEL
        value: nova-3

      # Inline JSON for the service-account key. Required because Render
      # workers can't easily mount a credential file.
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_WORKSHEET_NAME
        value: Intakes

      - key: ESCALATION_ENABLED
        value: "true"
      - key: ESCALATION_EMAIL_TO
        sync: false
      - key: ESCALATION_EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
